<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOFT SERIES — Menu 2087</title>
<style>
  :root {
    --bg: #0a0a0f;
    --bg-2: #11111a;
    --fg: #f4f4f8;
    --muted: #7a7a8c;
    --accent: #ff2d6f;
    --accent-2: #00e5ff;
    --border: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: ui-sans-serif, -apple-system, "Segoe UI", Inter, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }
  body {
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(255,45,111,0.12), transparent 60%),
      radial-gradient(1000px 500px at -10% 30%, rgba(0,229,255,0.08), transparent 60%),
      var(--bg);
    min-height: 100vh;
  }
  header {
    padding: 64px 32px 40px;
    max-width: 1200px;
    margin: 0 auto;
    border-bottom: 1px solid var(--border);
  }
  .eyebrow {
    color: var(--accent-2);
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 16px;
    font-weight: 600;
  }
  h1 {
    font-size: clamp(40px, 7vw, 88px);
    line-height: 0.95;
    letter-spacing: -0.03em;
    font-weight: 800;
    margin-bottom: 20px;
  }
  h1 .accent { color: var(--accent); }
  .tagline {
    color: var(--muted);
    font-size: 18px;
    max-width: 560px;
  }
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 48px 32px 96px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }
  .card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: transform 0.25s ease, border-color 0.25s ease;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: rgba(255,45,111,0.4);
  }
  .thumb {
    aspect-ratio: 1 / 1;
    background: #000;
    overflow: hidden;
    position: relative;
  }
  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .meta {
    padding: 16px 18px 18px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
  }
  .name {
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.04em;
  }
  .num {
    color: var(--muted);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.1em;
  }
  footer {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 32px 48px;
    color: var(--muted);
    font-size: 13px;
    border-top: 1px solid var(--border);
  }
  @media (max-width: 540px) {
    header { padding: 40px 20px 28px; }
    main { padding: 28px 20px 64px; }
    footer { padding: 20px 20px 32px; }
  }
</style>
</head>
<body>
<header>
  <div class="eyebrow"><a href="../../" style="color:inherit;text-decoration:none;">&larr; All projects</a></div>
  <h1 style="margin-top:8px;">Soft <span class="accent">Series</span><br>Menu 2087</h1>
  <p class="tagline">Seven fast-food artifacts from a future that never quite happened. Hover to feel them move.</p>
</header>

<main>
  <section class="grid" id="grid"></section>
</main>

<footer>
  Soft Series &middot; 2026
</footer>

<script>
  const items = [
    { n: "01", name: "QUANTUMBURGER",       file: "01_QUANTUMBURGER.gif" },
    { n: "02", name: "NEONFRIES",           file: "02_NEONFRIES.gif" },
    { n: "03", name: "PLASMACHEESESTICKS",  file: "03_PLASMACHEESESTICKS.gif" },
    { n: "04", name: "NEURALPANCAKES",      file: "04_NEURALPANCAKES.gif" },
    { n: "05", name: "CYBERSANDWICH",       file: "05_CYBERSANDWICH.gif" },
    { n: "06", name: "CHROMECINNAMONROLL",  file: "06_CHROMECINNAMONROLL.gif" },
    { n: "07", name: "HOLOSHAWERMA",        file: "07_HOLOSHAWERMA.gif" },
  ];
  const grid = document.getElementById("grid");
  grid.innerHTML = items.map(i => `
    <article class="card">
      <div class="thumb"><img src="${i.file}" alt="${i.name}" loading="lazy"></div>
      <div class="meta">
        <span class="name">${i.name}</span>
        <span class="num">${i.n} / 07</span>
      </div>
    </article>
  `).join("");
</script>
</body>
</html>
