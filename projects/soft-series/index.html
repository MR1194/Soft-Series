<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOFT SERIES — Menu 2087</title>
<style>
  :root {
    --bg: #0a0a0f;
    --bg-2: #11111a;
    --fg: #f4f4f8;
    --muted: #7a7a8c;
    --accent: #ff2d6f;
    --accent-2: #00e5ff;
    --border: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: ui-sans-serif, -apple-system, "Segoe UI", Inter, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }
  body {
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(255,45,111,0.12), transparent 60%),
      radial-gradient(1000px 500px at -10% 30%, rgba(0,229,255,0.08), transparent 60%),
      var(--bg);
    min-height: 100vh;
  }
  header {
    padding: 64px 32px 40px;
    max-width: 1200px;
    margin: 0 auto;
    border-bottom: 1px solid var(--border);
  }
  .eyebrow {
    color: var(--accent-2);
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 16px;
    font-weight: 600;
  }
  h1 {
    font-size: clamp(40px, 7vw, 88px);
    line-height: 0.95;
    letter-spacing: -0.03em;
    font-weight: 800;
    margin-bottom: 20px;
  }
  h1 .accent { color: var(--accent); }
  .tagline {
    color: var(--muted);
    font-size: 18px;
    max-width: 560px;
  }
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 48px 32px 96px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }
  .card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: transform 0.25s ease, border-color 0.25s ease;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: rgba(255,45,111,0.4);
  }
  .thumb {
    aspect-ratio: 1 / 1;
    background: #000;
    overflow: hidden;
    position: relative;
  }
  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .meta {
    padding: 16px 18px 18px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
  }
  .name {
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.04em;
  }
  .num {
    color: var(--muted);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.1em;
  }
  footer {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 32px 48px;
    color: var(--muted);
    font-size: 13px;
    border-top: 1px solid var(--border);
  }
  .sound-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    background: rgba(17,17,26,0.85);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    color: var(--fg);
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 10px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: border-color 0.2s ease, color 0.2s ease;
  }
  .sound-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .sound-toggle.on { color: var(--accent-2); border-color: rgba(0,229,255,0.45); }
  @media (max-width: 540px) {
    header { padding: 40px 20px 28px; }
    main { padding: 28px 20px 64px; }
    footer { padding: 20px 20px 32px; }
    .sound-toggle { top: 12px; right: 12px; font-size: 11px; padding: 8px 12px; }
  }
</style>
</head>
<body>
<button class="sound-toggle" id="soundToggle" aria-pressed="false">Sound: Off</button>
<header>
  <div class="eyebrow"><a href="../../" style="color:inherit;text-decoration:none;">&larr; All projects</a></div>
  <h1 style="margin-top:8px;">Soft <span class="accent">Series</span><br>Menu 2087</h1>
  <p class="tagline">Seven fast-food artifacts from a future that never quite happened. Turn sound on for rain — hover a card for jazz.</p>
</header>

<main>
  <section class="grid" id="grid"></section>
</main>

<footer>
  Soft Series &middot; 2026
</footer>

<script>
  const items = [
    { n: "01", name: "QUANTUMBURGER",       file: "01_QUANTUMBURGER.gif",       sound: "burger" },
    { n: "02", name: "NEONFRIES",           file: "02_NEONFRIES.gif",           sound: "fries" },
    { n: "03", name: "PLASMACHEESESTICKS",  file: "03_PLASMACHEESESTICKS.gif",  sound: "cheese" },
    { n: "04", name: "NEURALPANCAKES",      file: "04_NEURALPANCAKES.gif",      sound: "pancakes" },
    { n: "05", name: "CYBERSANDWICH",       file: "05_CYBERSANDWICH.gif",       sound: "sandwich" },
    { n: "06", name: "CHROMECINNAMONROLL",  file: "06_CHROMECINNAMONROLL.gif",  sound: "cinnamon" },
    { n: "07", name: "HOLOSHAWERMA",        file: "07_HOLOSHAWERMA.gif",        sound: "shawerma" },
  ];
  const grid = document.getElementById("grid");
  grid.innerHTML = items.map(i => `
    <article class="card" data-sound="${i.sound}">
      <div class="thumb"><img src="${i.file}" alt="${i.name}" loading="lazy"></div>
      <div class="meta">
        <span class="name">${i.name}</span>
        <span class="num">${i.n} / 07</span>
      </div>
    </article>
  `).join("");

  // ===== Audio: rain (continuous, soft) + jazz (loops on first hover, louder) =====
  let audioCtx = null;
  let masterGain = null;
  let soundEnabled = false;

  let rainActive = false, rainTimer = null, rainMasterGain = null;
  let jazzActive = false, jazzTimer = null, jazzMasterGain = null;

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.3;
    masterGain.connect(audioCtx.destination);
  }

  function env(node, t0, attack, decay, peak) {
    node.gain.setValueAtTime(0, t0);
    node.gain.linearRampToValueAtTime(peak, t0 + attack);
    node.gain.exponentialRampToValueAtTime(0.0001, t0 + attack + decay);
  }

  function osc(type, freq, t0) {
    const o = audioCtx.createOscillator();
    o.type = type;
    o.frequency.setValueAtTime(freq, t0);
    return o;
  }

  function noise(duration) {
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * duration, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    return src;
  }

  // === RAIN LOOP (warm rain, no thunder, starts when Sound is turned On) ===
  function stopRainLoop() {
    rainActive = false;
    if (rainTimer) { clearTimeout(rainTimer); rainTimer = null; }
    if (rainMasterGain) {
      const g = rainMasterGain; rainMasterGain = null;
      try {
        g.gain.cancelScheduledValues(audioCtx.currentTime);
        g.gain.setValueAtTime(g.gain.value, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);
      } catch (e) {}
      setTimeout(() => { try { g.disconnect(); } catch (e) {} }, 400);
    }
  }

  function scheduleRainSegment() {
    if (!rainActive || !rainMasterGain) return;
    const t = audioCtx.currentTime;
    const dur = 6.0;
    const out = rainMasterGain;

    // Warm body (1.2 kHz bandpass)
    const body = noise(dur);
    const bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 1200; bp.Q.value = 0.8;
    const bodyG = audioCtx.createGain();
    bodyG.gain.setValueAtTime(0, t);
    bodyG.gain.linearRampToValueAtTime(0.6, t + 0.4);
    bodyG.gain.setValueAtTime(0.6, t + dur - 0.4);
    bodyG.gain.linearRampToValueAtTime(0.001, t + dur);
    body.connect(bp).connect(bodyG).connect(out);
    body.start(t); body.stop(t + dur);

    // Low-mid warmth
    const low = noise(dur);
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 600;
    const lowG = audioCtx.createGain();
    lowG.gain.setValueAtTime(0, t);
    lowG.gain.linearRampToValueAtTime(0.45, t + 0.4);
    lowG.gain.setValueAtTime(0.45, t + dur - 0.4);
    lowG.gain.linearRampToValueAtTime(0.001, t + dur);
    low.connect(lp).connect(lowG).connect(out);
    low.start(t); low.stop(t + dur);

    // Soft high air
    const hi = noise(dur);
    const hp = audioCtx.createBiquadFilter();
    hp.type = 'highpass'; hp.frequency.value = 4500;
    const hiG = audioCtx.createGain();
    hiG.gain.setValueAtTime(0, t);
    hiG.gain.linearRampToValueAtTime(0.13, t + 0.4);
    hiG.gain.setValueAtTime(0.13, t + dur - 0.4);
    hiG.gain.linearRampToValueAtTime(0.001, t + dur);
    hi.connect(hp).connect(hiG).connect(out);
    hi.start(t); hi.stop(t + dur);

    // Pitter-patter drops
    for (let i = 0; i < 70; i++) {
      const dt = Math.random() * (dur - 0.1);
      const drop = noise(0.035);
      const dropHP = audioCtx.createBiquadFilter();
      dropHP.type = 'highpass'; dropHP.frequency.value = 2000 + Math.random() * 2200;
      const dropG = audioCtx.createGain();
      env(dropG, t + dt, 0.001, 0.014, 0.16 + Math.random() * 0.14);
      drop.connect(dropHP).connect(dropG).connect(out);
      drop.start(t + dt); drop.stop(t + dt + 0.035);
    }

    rainTimer = setTimeout(scheduleRainSegment, (dur - 0.3) * 1000);
  }

  function startRainLoop() {
    if (!soundEnabled || !audioCtx) return;
    stopRainLoop();
    rainActive = true;
    rainMasterGain = audioCtx.createGain();
    rainMasterGain.gain.value = 0.5; // rain sits underneath jazz
    rainMasterGain.connect(masterGain);
    scheduleRainSegment();
  }

  // === JAZZ LOOP (soft piano chords + walking bass, ii-V-iii-VI in C) ===
  function pianoNote(freq, t, dur, gain, out) {
    const o1 = audioCtx.createOscillator();
    o1.type = 'sine'; o1.frequency.value = freq;
    const o2 = audioCtx.createOscillator();
    o2.type = 'triangle'; o2.frequency.value = freq * 2;
    const g1 = audioCtx.createGain();
    g1.gain.setValueAtTime(0, t);
    g1.gain.linearRampToValueAtTime(gain, t + 0.008);
    g1.gain.exponentialRampToValueAtTime(0.001, t + dur);
    const g2 = audioCtx.createGain();
    g2.gain.setValueAtTime(0, t);
    g2.gain.linearRampToValueAtTime(gain * 0.22, t + 0.008);
    g2.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.65);
    o1.connect(g1).connect(out);
    o2.connect(g2).connect(out);
    o1.start(t); o1.stop(t + dur + 0.05);
    o2.start(t); o2.stop(t + dur + 0.05);
  }

  function bassNote(freq, t, dur, gain, out) {
    const o = audioCtx.createOscillator();
    o.type = 'triangle'; o.frequency.value = freq;
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 700;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(gain, t + 0.015);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(lp).connect(g).connect(out);
    o.start(t); o.stop(t + dur + 0.05);
  }

  function stopJazzLoop() {
    jazzActive = false;
    if (jazzTimer) { clearTimeout(jazzTimer); jazzTimer = null; }
    if (jazzMasterGain) {
      const g = jazzMasterGain; jazzMasterGain = null;
      try {
        g.gain.cancelScheduledValues(audioCtx.currentTime);
        g.gain.setValueAtTime(g.gain.value, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);
      } catch (e) {}
      setTimeout(() => { try { g.disconnect(); } catch (e) {} }, 400);
    }
  }

  function scheduleJazzBar() {
    if (!jazzActive || !jazzMasterGain) return;
    const t = audioCtx.currentTime;
    const out = jazzMasterGain;
    const beat = 0.75; // ~80 BPM

    // Each chord lasts 2 beats; 4 chords = 8 beats = 6 s
    const segments = [
      { chord: [349.23, 440,    523.25, 659.25], bass: [146.83, 220   ] }, // Dm7
      { chord: [349.23, 440,    493.88, 587.33], bass: [98,     146.83] }, // G7
      { chord: [329.63, 392,    493.88, 587.33], bass: [130.81, 196   ] }, // Cmaj7
      { chord: [392,    440,    554.37, 659.25], bass: [110,    164.81] }, // A7
    ];

    segments.forEach((seg, i) => {
      const segT = t + i * 2 * beat;
      const segDur = 2 * beat;
      seg.chord.forEach(f => pianoNote(f, segT, segDur, 0.14, out));
      seg.bass.forEach((bf, j) => bassNote(bf, segT + j * beat, beat * 0.9, 0.32, out));
    });

    jazzTimer = setTimeout(scheduleJazzBar, 8 * beat * 1000);
  }

  function startJazzLoop() {
    if (!soundEnabled || !audioCtx || jazzActive) return; // don't restart if already playing
    jazzActive = true;
    jazzMasterGain = audioCtx.createGain();
    jazzMasterGain.gain.value = 0.9; // louder than rain
    jazzMasterGain.connect(masterGain);
    scheduleJazzBar();
  }

  // Hover (desktop) or tap (mobile) any card → start jazz on top of rain
  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('mouseenter', startJazzLoop);
    card.addEventListener('touchstart', startJazzLoop, { passive: true });
  });

  // Sound toggle: ON starts rain immediately + enables hover-triggered jazz; OFF stops both
  const toggle = document.getElementById('soundToggle');
  toggle.addEventListener('click', () => {
    if (!soundEnabled) {
      initAudio();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      soundEnabled = true;
      startRainLoop();
      toggle.textContent = 'Sound: On';
      toggle.classList.add('on');
      toggle.setAttribute('aria-pressed', 'true');
    } else {
      soundEnabled = false;
      stopRainLoop();
      stopJazzLoop();
      toggle.textContent = 'Sound: Off';
      toggle.classList.remove('on');
      toggle.setAttribute('aria-pressed', 'false');
    }
  });
</script>
</body>
</html>
